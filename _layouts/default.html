<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons/css/academicons.min.css">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | absolute_url }}">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>

        <!-- Site-wide logo below description -->
        <p>
          <img src="/assets/img/rabi_headshot.jpg" alt="Site Logo" width="240">
        </p>

        <!-- Navigation menu -->
          <nav>
            <a href="{{ '/' | absolute_url }}">Home</a> |
            <!--<a href="{{ '/cv' | relative_url }}">CV</a> |-->
            <<a href="{{ '/research' | relative_url }}">Research</a> |
            <a href="{{ '/publications' | relative_url }}">Publications</a> |
            <!--<a href="{{ '/misc' | relative_url }}">Presentations</a> -->
          </nav>
          <!-- Dark/Light toggle
          <button id="toggle-dark" style="margin-top:10px;">🌙 Toggle Dark/Light</button> -->
      </header>

      <section>
        {{ content }}
      </section>

      <!-- Footer -->
      <footer>
        <p>
          <!-- Social icons -->
          <a href="https://orcid.org/0009-0007-0682-0463" target="_blank" rel="noopener noreferrer" title="ORCID">
            <!--<i class="fab fa-orcid fa-2x"></i>-->
            <i class="ai ai-orcid ai-2x"></i>
          </a>
          <a href="https://scholar.google.com/citations?user=u8VgoyIAAAAJ&hl=en" target="_blank" rel="noopener noreferrer" title="Google Scholar">
            <i class="fas fa-graduation-cap fa-2x"></i>
            
         
         
          <a href="https://www.researchgate.net/profile/Rabisankar-Samanta" target="_blank" rel="noopener noreferrer" title="ResearchGate">
            <i class="fab fa-researchgate fa-2x"></i>
            <!--<i class="ai ai-researchgate"></i>-->
          </a>
          <a href="https://www.linkedin.com/in/rabisankar-samanta-82243b12a/" target="_blank" rel="noopener noreferrer" title="LinkedIn">
            <i class="fab fa-linkedin fa-2x"></i>
          </a>
          <a href="https://github.com/rabioptics" target="_blank" rel="noopener noreferrer" title="GitHub">
            <i class="fab fa-github fa-2x"></i>
          </a>
          <!--
          <a href="https://discord.com/users/islam_mursalin" target="_blank" title="Discord">
            <i class="fab fa-discord fa-2x"></i>
          </a>-->
        </p>
         <p>&copy; {{ site.time | date: "%Y" }} {{ site.title }}.</p>
      </footer>
    </div>
